<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | WCIA</title>
    <link rel="icon" href="https://wcia.tv/wp-content/uploads/2026/03/cropped-imresizer-WCIA-logo-1-1-32x32.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .error-container { text-align: center; padding: 100px 0; }
        .error-container h1 { font-size: 8rem; font-weight: 900; color: var(--gold); margin: 0; }
        .error-container h2 { color: var(--white); font-size: 2rem; }
        .error-container p { color: var(--text-muted); margin: 20px 0; }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="top-bar">...</div>
    <header class="main-header">...</header>

    <section style="background:var(--primary-dark); min-height:70vh; display:flex; align-items:center;">
        <div class="container">
            <div class="error-container">
                <h1>404</h1>
                <h2>Oops! Page not found.</h2>
                <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
                <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="main-footer">...</footer>
    <script src="/js/main.js"></script>
</body>
</html>
