<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Membership Renewal | WCIA</title>
    <link rel="icon" href="https://wcia.tv/wp-content/uploads/2026/03/cropped-imresizer-WCIA-logo-1-1-32x32.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <!-- HEADER -->
    <div class="top-bar">...</div>
    <header class="main-header">...</header>

    <section class="section-padding" style="background:var(--primary-dark);">
        <div class="container">
            <h2 class="section-title">Membership <span class="highlight">Renewal</span></h2>
            <p class="section-subtitle">Renew your membership annually to continue being a part of the WCIA family.</p>
            <div style="max-width:600px; margin:40px auto; background:rgba(255,255,255,0.04); padding:40px; border-radius:var(--radius); border:1px solid rgba(255,255,255,0.06);">
                <form onsubmit="alert('Renewal request submitted. We will contact you shortly.'); return false;">
                    <div class="form-group">
                        <label for="renewalName">Full Name *</label>
                        <input type="text" id="renewalName" placeholder="Your full name" required style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:var(--white);" />
                    </div>
                    <div class="form-group">
                        <label for="renewalEmail">Email *</label>
                        <input type="email" id="renewalEmail" placeholder="your@email.com" required style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:var(--white);" />
                    </div>
                    <div class="form-group">
                        <label for="renewalPhone">Phone</label>
                        <input type="tel" id="renewalPhone" placeholder="+91 9876543210" style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:var(--white);" />
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-gold" style="width:100%;"><i class="fas fa-sync-alt"></i> Request Renewal</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="main-footer">...</footer>
    <script src="/js/main.js"></script>
</body>
</html>
