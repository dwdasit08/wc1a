<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery | WCIA</title>
    <link rel="icon" href="https://wcia.tv/wp-content/uploads/2026/03/cropped-imresizer-WCIA-logo-1-1-32x32.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 40px; }
        .photo-grid .item { border-radius: var(--radius); overflow: hidden; border: 1px solid rgba(255,255,255,0.06); transition: var(--transition); cursor: pointer; }
        .photo-grid .item img { width: 100%; height: 250px; object-fit: cover; transition: var(--transition); }
        .photo-grid .item:hover { transform: scale(1.02); border-color: var(--gold); }
        .photo-grid .item:hover img { transform: scale(1.05); }
        .photo-grid .item .caption { padding: 12px 16px; background: rgba(0,0,0,0.6); color: var(--text-light); font-size: 0.9rem; }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="top-bar">...</div>
    <header class="main-header">...</header>

    <section class="section-padding" style="background:var(--primary-dark);">
        <div class="container">
            <h2 class="section-title">Photo <span class="highlight">Gallery</span></h2>
            <p class="section-subtitle">All the action captured in stills.</p>
            <div class="photo-grid">
                <div class="item"><img src="https://wcia.tv/wp-content/uploads/2021/10/2nd-National-Wheelchair-Cricket-Championship-300x200.jpg" alt="2nd National" /><div class="caption">2nd National Championship</div></div>
                <div class="item"><img src="https://wcia.tv/wp-content/uploads/2025/02/WhatsApp-Image-2025-02-07-at-12.26.25-PM-1-300x200.jpeg" alt="4th National" /><div class="caption">4th National Championship</div></div>
                <div class="item"><img src="https://wcia.tv/wp-content/uploads/2021/10/1548129008-IMG-20170120-WA0008-300x225.jpg" alt="Bangalore 2017" /><div class="caption">Bangalore April 2017</div></div>
                <div class="item"><img src="https://wcia.tv/wp-content/uploads/2021/10/1548129821-IMG-20170116-WA0015-300x170.jpg" alt="General" /><div class="caption">General</div></div>
                <div class="item"><img src="https://wcia.tv/wp-content/uploads/2021/10/1554744967-IMG_9791-300x200.jpg" alt="2nd National" /><div class="caption">2nd National Championship</div></div>
                <div class="item"><img src="https://wcia.tv/wp-content/uploads/2021/10/Ind-vs-Pakistan-300x200.jpg" alt="Ind vs Pakistan" /><div class="caption">Ind vs Pakistan</div></div>
                <!-- Add more images as needed -->
            </div>
            <div style="text-align:center; margin-top:40px;"><a href="/gallery.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Gallery</a></div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="main-footer">...</footer>
    <script src="/js/main.js"></script>
</body>
</html>
